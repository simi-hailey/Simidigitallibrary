<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>
        Digital Library Information Retrieval System
    </title>
    <link rel="stylesheet" href="simistyle.css">
</head>
<body>
<h1>
    Digital Library Information Retrieval System
</h1>
<div class="controls">
    <input 
        type="text" 
        id="searchInput"
        placeholder="Search by Title, Author, ISBN, Year or Keywords">
    <button id="searchBtn">
        Search
    </button>
    <select id="categoryFilter">
        <option value="">
            All Categories
        </option>
    </select>
    <select id="availabilityFilter">
        <option value="">
            All Status
        </option>
        <option value="Available">
            Available
        </option>
        <option value="Borrowed">
            Borrowed
        </option>
    </select>
    <button id="resetBtn">
        Reset
    </button>
</div>
<table>
<thead>
<tr>
<th>
    ID
</th>
<th>
    Title
</th>
<th>
    Author
</th>
<th>
    Category
</th>
<th>
    Publisher
</th>
<th>
    Year
</th>
<th>
    Status
</th>
</tr>
</thead>
<tbody id="bookTable">
</tbody>
</table>
<p id="message">
</p>
<script src="simiscript.js"></script>
</body>
</html>
